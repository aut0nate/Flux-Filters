services:
  flux-filters:
    build:
      context: .
      dockerfile: Dockerfile
    image: flux-filters:local
    container_name: flux-filters
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - flux-filters-data:/data
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: 10m
        max-file: "3"

volumes:
  flux-filters-data:
