name: CI - Validate and build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI_IMAGE_TAG: flux-filters:ci

jobs:
  lint-test-build:
    name: Lint, test and build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build --tag "$CI_IMAGE_TAG" .

      - name: Smoke test Docker image
        run: |
          set -euo pipefail

          docker run --detach --name flux-filters-smoke \
            --publish 3000:3000 \
            --env PORT=3000 \
            --env MINIFLUX_ALLOWED_HOSTS=example.com \
            "$CI_IMAGE_TAG"

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health; then
              docker logs flux-filters-smoke
              exit 0
            fi
            sleep 2
          done

          docker logs flux-filters-smoke
          exit 1

      - name: Clean up smoke test container
        if: always()
        run: docker rm --force flux-filters-smoke || true
