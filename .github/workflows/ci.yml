name: Test, build, and publish

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

env:
  IMAGE_NAME: flux-filters

jobs:
  test-build-and-publish:
    name: Test, build, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build --tag "$IMAGE_NAME:${GITHUB_SHA}" .

      - name: Smoke test Docker image
        run: |
          docker run --detach --name flux-filters-smoke \
            --publish 3000:3000 \
            --env PORT=3000 \
            --env MINIFLUX_ALLOWED_HOSTS=example.com \
            "$IMAGE_NAME:${GITHUB_SHA}"

          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs flux-filters-smoke
          exit 1

      - name: Clean up smoke test container
        if: always()
        run: docker rm --force flux-filters-smoke || true

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_NAME:${GITHUB_SHA}" "${{ secrets.DOCKERHUB_USERNAME }}/flux-filters:${GITHUB_SHA}"
          docker tag "$IMAGE_NAME:${GITHUB_SHA}" "${{ secrets.DOCKERHUB_USERNAME }}/flux-filters:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/flux-filters:${GITHUB_SHA}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/flux-filters:latest"
